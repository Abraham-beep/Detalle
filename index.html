<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para mi vide Sofía 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe0f0 0%, #ffecd2 50%, #e0f0ff 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
      position: relative;
      overflow-x: hidden;
    }

    #particles-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .main-card {
      background: rgba(255,255,255,0.88);
      border-radius: 2rem;
      padding: 2rem 2rem 1.5rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(220,100,150,0.15);
      position: relative;
      z-index: 2;
      border: 1.5px solid rgba(255,180,210,0.4);
    }

    .vide-tag {
      font-size: 0.9rem;
      color: #d06090;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }

    .sofia-name {
      font-family: 'Pacifico', cursive;
      font-size: 2.6rem;
      color: #e84393;
      animation: pulse 2s ease-in-out infinite;
      margin-bottom: 0.3rem;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.04); }
    }

    .subtitle {
      font-size: 0.95rem;
      color: #c06080;
      margin-bottom: 1.4rem;
      font-weight: 600;
    }

    /* ── Music card ── */
    .music-card {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: 1.4rem;
      padding: 1rem 1.2rem 0.8rem;
      margin-bottom: 1.3rem;
      border: 1.5px solid rgba(255,110,180,0.3);
      overflow: hidden;
    }

    .music-top {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }

    .music-cover {
      width: 52px; height: 52px;
      border-radius: 0.7rem;
      background: linear-gradient(135deg, #ff6eb4, #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
      animation: spinSlow 8s linear infinite paused;
    }

    @keyframes spinSlow {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .music-info  { text-align: left; flex: 1; }
    .music-song  { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 0.1rem; }
    .music-artist{ font-size: 0.82rem; color: rgba(255,255,255,0.6); }
    .yt-label    { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 0.2rem; }

    .yt-wrapper {
      border-radius: 0.9rem;
      overflow: hidden;
      position: relative;
      padding-top: 56.25%;
    }

    .yt-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* ── Message box ── */
    .message-box {
      background: linear-gradient(135deg, #fff0f8, #fff8f0);
      border-radius: 1.2rem;
      padding: 1.2rem 1.4rem;
      border: 1.5px solid #ffd6e8;
      margin-bottom: 1.3rem;
      min-height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .message-text {
      font-size: 1.05rem;
      color: #7a3050;
      line-height: 1.6;
      font-weight: 600;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Buttons ── */
    .btn-primary {
      background: linear-gradient(135deg, #ff6eb4, #ff9a5c);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 15px rgba(255,110,180,0.35);
      margin-bottom: 1.1rem;
    }

    .btn-primary:hover  { transform: translateY(-2px) scale(1.04); }
    .btn-primary:active { transform: scale(0.97); }

    /* ── Emoji row ── */
    .emoji-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .emoji-btn {
      background: rgba(255,220,240,0.7);
      border: 1.5px solid #ffc0d8;
      border-radius: 50px;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      font-size: 1.3rem;
      transition: transform 0.1s;
    }

    .emoji-btn:hover  { transform: scale(1.2); }
    .emoji-btn:active { transform: scale(0.9); }

    /* ── Counters ── */
    .counter-section {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .counter-chip {
      background: linear-gradient(135deg, #ffe0f7, #fff3e0);
      border: 1.5px solid #ffc8e8;
      border-radius: 50px;
      padding: 0.35rem 0.9rem;
      font-size: 0.85rem;
      color: #a03060;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* ── Animations ── */
    .confetti-piece {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      border-radius: 2px;
      animation: confettiFall 1.5s ease-out forwards;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg);    opacity: 1; }
      100% { transform: translateY(300px) rotate(720deg); opacity: 0; }
    }

    .heart-explosion {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      animation: explode 1s ease-out forwards;
    }

    @keyframes explode {
      0%   { transform: scale(0) translate(0,0); opacity: 1; }
      60%  { opacity: 1; }
      100% { transform: scale(1.5) translate(var(--dx), var(--dy)); opacity: 0; }
    }
  </style>
</head>
<body>

<div id="particles-container"></div>

<div class="main-card">
  <div class="vide-tag">✨ para mi vide ✨</div>
  <div class="sofia-name">Sofía 💕</div>
  <div class="subtitle">Esta página existe solo para ti, porque te lo mereces todo 🌸</div>

  <div class="music-card">
    <div class="music-top">
      <div class="music-cover" id="cover">🎵</div>
      <div class="music-info">
        <div class="music-song">Feel It</div>
        <div class="music-artist">d4vd</div>
        <div class="yt-label">nuestra canción 💕</div>
      </div>
    </div>
    <div class="yt-wrapper">
      <iframe
        src="https://www.youtube.com/embed/vZi8ET9k11g?rel=0&modestbranding=1"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <div class="message-box">
    <div class="message-text" id="msg-text">
      Haz clic y recibe algo bonito, Sofi ✨
    </div>
  </div>

  <button class="btn-primary" onclick="newMessage()">💌 Quiero un mensajito</button>

  <div class="emoji-row">
    <button class="emoji-btn" onclick="sendHeart(this,'❤️')">❤️</button>
    <button class="emoji-btn" onclick="sendHeart(this,'😍')">😍</button>
    <button class="emoji-btn" onclick="sendHeart(this,'🌸')">🌸</button>
    <button class="emoji-btn" onclick="sendHeart(this,'🦋')">🦋</button>
    <button class="emoji-btn" onclick="sendHeart(this,'⭐')">⭐</button>
    <button class="emoji-btn" onclick="launchConfetti()">🎉</button>
  </div>

  <div class="counter-section">
    <div class="counter-chip">💌 <span id="msg-count">0</span> mensajes</div>
    <div class="counter-chip">❤️ <span id="heart-count">0</span> corazones</div>
  </div>
</div>

<script>
  const messages = [
    "Sofía, eres lo más bonito que me ha pasado 🌈",
    "Mi vide... ¿sabes cuánto te quiero? Más de lo que caben las palabras acá 💕",
    "Cuando pienso en ti, todo lo difícil se vuelve fácil, Sofi ✨",
    "Eres fuerte, eres hermosa, eres increíble. Y yo lo sé aunque a veces tú no lo sientas 💪🌺",
    "Sofi, el mundo es definitivamente mejor con vos en él 🌍💫",
    "Mi vide favorita en todo el universo: tú. Sin dudarlo ni un segundo 🚀💞",
    "Tus ojos son mi lugar favorito. Tu risa, mi sonido preferido 🎶",
    "Sofía, gracias por existir. En serio. No es poca cosa 🌟",
    "Oye Sofi... te digo mi vide porque eso es exactamente lo que eres para mí 🥺❤️",
    "Mereces todas las cosas bonitas. Todas. Sin excepción, mi vide 🌻",
    "Sofía, si pudieras verte con mis ojos, te enamorarías de ti misma 🪞✨",
    "No tienes que ser perfecta para ser perfecta para mí, Sofi 🥰",
    "Cuando te ríes, el tiempo se detiene un momento. Ese momento es mi favorito 😄❤️",
    "Mi vide, eres la razón por la que sonrío incluso los días difíciles 🌈",
    "Sofía, te quiero hoy, mañana y todos los días que vengan 💖",
    "Feel It de d4vd me recuerda a nosotros cada vez que la escucho 🎵💕",
  ];

  let msgCount = 0, heartCount = 0, lastMsg = -1;

  function initParticles() {
    const c = document.getElementById('particles-container');
    const emojis = ['💕','🌸','✨','💫','🦋','⭐','💖','🌺'];
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.fontSize = (0.9 + Math.random() * 0.8) + 'rem';
      c.appendChild(p);
    }
  }

  function newMessage() {
    let idx;
    do { idx = Math.floor(Math.random() * messages.length); }
    while (idx === lastMsg && messages.length > 1);
    lastMsg = idx;
    const box = document.getElementById('msg-text');
    box.style.animation = 'none';
    box.offsetHeight;
    box.style.animation = 'fadeIn 0.5s ease';
    box.textContent = messages[idx];
    msgCount++;
    document.getElementById('msg-count').textContent = msgCount;
    if (msgCount % 3 === 0) launchConfetti();
  }

  function sendHeart(btn, emoji) {
    heartCount++;
    document.getElementById('heart-count').textContent = heartCount;
    const rect = btn.getBoundingClientRect();
    for (let i = 0; i < 6; i++) {
      const h = document.createElement('div');
      h.className = 'heart-explosion';
      h.textContent = emoji;
      const angle = (i / 6) * Math.PI * 2;
      const dist = 50 + Math.random() * 60;
      h.style.setProperty('--dx', (Math.cos(angle) * dist) + 'px');
      h.style.setProperty('--dy', (Math.sin(angle) * dist) + 'px');
      h.style.left = (rect.left + rect.width / 2 - 15) + 'px';
      h.style.top  = (rect.top  + rect.height / 2 - 15) + 'px';
      h.style.fontSize = (1.2 + Math.random() * 0.8) + 'rem';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1100);
    }
    btn.style.transform = 'scale(1.3)';
    setTimeout(() => btn.style.transform = '', 200);
  }

  function launchConfetti() {
    const colors = ['#ff6eb4','#ff9a5c','#a78bfa','#34d399','#fbbf24','#f472b6','#60a5fa'];
    for (let i = 0; i < 35; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.left   = (20 + Math.random() * 60) + 'vw';
      c.style.top    = (Math.random() * 40) + 'vh';
      c.style.width  = (6 + Math.random() * 8) + 'px';
      c.style.height = (6 + Math.random() * 8) + 'px';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      c.style.animationDuration = (1 + Math.random()) + 's';
      c.style.animationDelay   = (Math.random() * 0.5) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2000);
    }
  }

  initParticles();
</script>
</body>
</html>
